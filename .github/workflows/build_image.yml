name: Build Image
on:
  push:
    branches:
      - main
    paths-ignore:
      - .github/workflows/build_image.yml
      - README.md
      - DESC.txt
  pull_request:
    branches:
      - main
    paths-ignore:
      - .github/workflows/build_image.yml
      - README.md
      - DESC.txt

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine image version
        run: |
          # Use VERSION.txt as the source of truth for release tags.
          if [ -f VERSION.txt ]; then
            VERSION=$(tr -d '[:space:]' < VERSION.txt)
          else
            VERSION=""
          fi

          if [ -n "$VERSION" ]; then
            echo "IMAGE_VERSION=$VERSION" >> $GITHUB_ENV
          else
            echo "IMAGE_VERSION=latest" >> $GITHUB_ENV
          fi

      - name: Normalize GitHub owner for image tags
        run: |
          echo "IMAGE_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Prepare image tags
        id: prepare_image_tags
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          VERSION="$IMAGE_VERSION"
          BASE_SHA="$PUSH_BEFORE_SHA"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
          fi

          VERSION_CHANGED=true
          if [ -n "$BASE_SHA" ] && [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ]; then
            VERSION_CHANGED=false
            if git diff --name-only "$BASE_SHA" "$CURRENT_SHA" -- VERSION.txt | grep -q .; then
              VERSION_CHANGED=true
            fi
          fi

          CHANNEL_TAG="stable"
          if [ "$VERSION" != "latest" ]; then
            case "$VERSION" in
              *-*)
                prerelease="${VERSION#*-}"
                CHANNEL_TAG="${prerelease%%.*}"
                CHANNEL_TAG="${CHANNEL_TAG%%+*}"
                ;;
            esac
          fi

          {
            echo "tags<<EOF"
            echo "${{ secrets.DOCKER_USERNAME }}/external-service-healthcheck:nightly"
            echo "${{ secrets.DOCKER_USERNAME }}/external-service-healthcheck:${{ github.sha }}"
            echo "ghcr.io/${IMAGE_OWNER_LC}/external-service-healthcheck:nightly"
            echo "ghcr.io/${IMAGE_OWNER_LC}/external-service-healthcheck:${{ github.sha }}"
            if [ "$VERSION_CHANGED" = "true" ]; then
              if [ "$CHANNEL_TAG" = "stable" ]; then
                echo "${{ secrets.DOCKER_USERNAME }}/external-service-healthcheck:${VERSION}"
                echo "${{ secrets.DOCKER_USERNAME }}/external-service-healthcheck:latest"
                echo "${{ secrets.DOCKER_USERNAME }}/external-service-healthcheck:stable"
                echo "ghcr.io/${IMAGE_OWNER_LC}/external-service-healthcheck:${VERSION}"
                echo "ghcr.io/${IMAGE_OWNER_LC}/external-service-healthcheck:latest"
                echo "ghcr.io/${IMAGE_OWNER_LC}/external-service-healthcheck:stable"
              else
                echo "${{ secrets.DOCKER_USERNAME }}/external-service-healthcheck:${VERSION}"
                echo "${{ secrets.DOCKER_USERNAME }}/external-service-healthcheck:${CHANNEL_TAG}"
                echo "ghcr.io/${IMAGE_OWNER_LC}/external-service-healthcheck:${VERSION}"
                echo "ghcr.io/${IMAGE_OWNER_LC}/external-service-healthcheck:${CHANNEL_TAG}"
              fi
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .dockerfile
          platforms: linux/386,linux/amd64,linux/arm/v7,linux/arm64
          push: true
          tags: ${{ steps.prepare_image_tags.outputs.tags }}
