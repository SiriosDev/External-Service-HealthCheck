name: Build Image
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine image version
        run: |
          # Prefer the latest git tag, fallback to VERSION.txt file, else 'latest'
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$TAG" ]; then
            echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
          elif [ -f VERSION.txt ]; then
            echo "IMAGE_TAG=$(cat VERSION.txt)" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the multi-arch Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .dockerfile
          platforms: linux/386,linux/amd64,linux/arm/v7,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/external-service-healthcheck:latest
            ${{ secrets.DOCKER_USERNAME }}/external-service-healthcheck:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/external-service-healthcheck:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/external-service-healthcheck:latest
            ghcr.io/${{ github.repository_owner }}/external-service-healthcheck:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/external-service-healthcheck:${{ env.IMAGE_TAG }}
